name: Android APK

# Compila un APK de Android (debug, instalable sin keystore) en la nube y lo
# deja descargable como artefacto del run y como un prerelease "android-latest"
# con enlace directo .apk para instalar desde el teléfono.
#
# Antes de ejecutarlo, añade en el repo (Settings → Secrets and variables →
# Actions) los secrets VITE_SUPABASE_URL y VITE_SUPABASE_ANON_KEY. Si faltan,
# el APK abrirá la pantalla de configuración en vez de conectarse a Supabase.

on:
  # Disparo automático al subir cambios a la rama de trabajo: genera el APK
  # descargable sin necesidad de fusionar a main ni pulsar botones.
  push:
    branches: [claude/chat-session-gjji9a]
  workflow_dispatch:

permissions:
  contents: write # necesario para publicar/actualizar el release con el APK

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Capacitor CLI requiere Node >= 22
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          # Variables públicas (anon) embebidas al compilar — mismo patrón que ci.yml.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
        working-directory: android

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk bisne-con-talla-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bisne-con-talla-debug-apk
          path: bisne-con-talla-debug.apk
          if-no-files-found: error

      - name: Publish to "android-latest" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: APK Android (última build)
          prerelease: true
          body: |
            APK de depuración de **Bisne con Talla** para instalar en dispositivos propios
            (Android 7.0+). Descarga `bisne-con-talla-debug.apk`, ábrelo en el teléfono y
            permite "instalar apps de orígenes desconocidos".

            Generado automáticamente desde el workflow *Android APK*.
          files: bisne-con-talla-debug.apk
